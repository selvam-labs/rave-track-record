<svg width="1200" height="540" viewBox="0 0 1200 540" xmlns="http://www.w3.org/2000/svg" role="img" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <title>RAVE system architecture</title>
  <desc>EventBridge triggers a Lambda container daily; inside it, signal ingest feeds a deterministic engine, which executes via the Alpaca paper API into a SQLite ledger. State persists in S3, a private email brief goes out via SES, and only NAV, metrics, and executed fills cross the privacy boundary to the public rave-track-record repo on GitHub Pages.</desc>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M1 1L9 5L1 9" fill="none" stroke="#64748b" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="1200" height="540" fill="#ffffff"/>

  <text x="40" y="46" font-size="20" font-weight="600" fill="#0f172a">RAVE — system architecture</text>
  <text x="40" y="70" font-size="13" fill="#64748b">Deterministic, volatility-governed, fully unattended. Runs itself every trading day.</text>

  <rect x="40" y="150" width="160" height="110" rx="8" fill="#f1f5f9" stroke="#94a3b8"/>
  <text x="120" y="180" font-size="14" font-weight="600" fill="#0f172a" text-anchor="middle">EventBridge</text>
  <text x="120" y="202" font-size="12" fill="#475569" text-anchor="middle">cron 10:00 ET</text>
  <text x="120" y="219" font-size="12" fill="#475569" text-anchor="middle">Mon–Fri · DST-aware</text>
  <text x="120" y="236" font-size="12" fill="#475569" text-anchor="middle">async retries: 0</text>

  <line x1="200" y1="205" x2="234" y2="205" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="240" y="100" width="640" height="220" rx="10" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="256" y="126" font-size="13" font-weight="600" fill="#334155">AWS Lambda — container image · Python 3.12 · SAM stack (dev / prod)</text>

  <rect x="260" y="145" width="140" height="150" rx="8" fill="#f1f5f9" stroke="#94a3b8"/>
  <text x="330" y="170" font-size="13.5" font-weight="600" fill="#0f172a" text-anchor="middle">1 · Ingest</text>
  <text x="330" y="194" font-size="12" fill="#475569" text-anchor="middle">Gmail API</text>
  <text x="330" y="211" font-size="12" fill="#475569" text-anchor="middle">daily risk ranges</text>
  <text x="330" y="228" font-size="12" fill="#475569" text-anchor="middle">(third-party range</text>
  <text x="330" y="245" font-size="12" fill="#475569" text-anchor="middle">provider)</text>

  <line x1="400" y1="220" x2="414" y2="220" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="415" y="145" width="140" height="150" rx="8" fill="#eef2ff" stroke="#6366f1"/>
  <text x="485" y="170" font-size="13.5" font-weight="600" fill="#312e81" text-anchor="middle">2 · Engine</text>
  <text x="485" y="194" font-size="12" fill="#4338ca" text-anchor="middle">status → what &amp; when</text>
  <text x="485" y="211" font-size="12" fill="#4338ca" text-anchor="middle">VIX → how much</text>
  <text x="485" y="228" font-size="12" fill="#4338ca" text-anchor="middle">SMA-325 trend gate</text>
  <text x="485" y="245" font-size="12" fill="#4338ca" text-anchor="middle">stops · circuit breaker</text>

  <line x1="555" y1="220" x2="569" y2="220" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="570" y="145" width="140" height="150" rx="8" fill="#f1f5f9" stroke="#94a3b8"/>
  <text x="640" y="170" font-size="13.5" font-weight="600" fill="#0f172a" text-anchor="middle">3 · Execution</text>
  <text x="640" y="194" font-size="12" fill="#475569" text-anchor="middle">Alpaca paper API</text>
  <text x="640" y="211" font-size="12" fill="#475569" text-anchor="middle">orders &amp; fills</text>
  <text x="640" y="228" font-size="12" fill="#475569" text-anchor="middle">graceful rejects</text>

  <line x1="710" y1="220" x2="724" y2="220" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="725" y="145" width="140" height="150" rx="8" fill="#f1f5f9" stroke="#94a3b8"/>
  <text x="795" y="170" font-size="13.5" font-weight="600" fill="#0f172a" text-anchor="middle">4 · Ledger</text>
  <text x="795" y="194" font-size="12" fill="#475569" text-anchor="middle">SQLite</text>
  <text x="795" y="211" font-size="12" fill="#475569" text-anchor="middle">positions · NAV</text>
  <text x="795" y="228" font-size="12" fill="#475569" text-anchor="middle">metrics (Sharpe</text>
  <text x="795" y="245" font-size="12" fill="#475569" text-anchor="middle">gated 20 sessions)</text>

  <line x1="430" y1="324" x2="430" y2="396" stroke="#64748b" stroke-width="1.5" marker-start="url(#arr)" marker-end="url(#arr)"/>
  <text x="445" y="364" font-size="11" fill="#64748b">state pull at start · push at end</text>

  <rect x="280" y="400" width="300" height="80" rx="8" fill="#f1f5f9" stroke="#94a3b8"/>
  <text x="430" y="430" font-size="13.5" font-weight="600" fill="#0f172a" text-anchor="middle">Amazon S3 — versioned state</text>
  <text x="430" y="452" font-size="12" fill="#475569" text-anchor="middle">ledger · OAuth token · daily briefs</text>

  <line x1="765" y1="324" x2="765" y2="396" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="650" y="400" width="230" height="80" rx="8" fill="#f1f5f9" stroke="#94a3b8"/>
  <text x="765" y="430" font-size="13.5" font-weight="600" fill="#0f172a" text-anchor="middle">Daily brief — Amazon SES</text>
  <text x="765" y="452" font-size="12" fill="#475569" text-anchor="middle">private email report</text>

  <line x1="925" y1="90" x2="925" y2="500" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="6 5"/>
  <text x="912" y="106" font-size="12" font-weight="600" fill="#dc2626" text-anchor="end">PRIVATE</text>
  <text x="938" y="106" font-size="12" font-weight="600" fill="#059669">PUBLIC</text>

  <line x1="880" y1="205" x2="949" y2="205" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="884" y="178" font-size="11" fill="#64748b">GitHub contents</text>
  <text x="884" y="192" font-size="11" fill="#64748b">API · 3 JSONs/day</text>

  <rect x="955" y="140" width="210" height="190" rx="8" fill="#ecfdf5" stroke="#10b981"/>
  <text x="1060" y="166" font-size="13.5" font-weight="600" fill="#064e3b" text-anchor="middle">rave-track-record</text>
  <text x="1060" y="190" font-size="12" fill="#047857" text-anchor="middle">public GitHub repo</text>
  <text x="1060" y="207" font-size="12" fill="#047857" text-anchor="middle">Pages dashboard · Plotly</text>
  <text x="1060" y="224" font-size="12" fill="#047857" text-anchor="middle">data/*.json — written</text>
  <text x="1060" y="241" font-size="12" fill="#047857" text-anchor="middle">only by bot commits</text>
  <text x="1060" y="258" font-size="12" fill="#047857" text-anchor="middle">tamper-evident history</text>
  <text x="1060" y="288" font-size="11" fill="#047857" text-anchor="middle">selvam-labs.github.io/</text>
  <text x="1060" y="302" font-size="11" fill="#047857" text-anchor="middle">rave-track-record</text>

  <text x="945" y="368" font-size="11.5" fill="#b91c1c">Only NAV, metrics &amp; executed fills</text>
  <text x="945" y="384" font-size="11.5" fill="#b91c1c">cross this line — enforced by</text>
  <text x="945" y="400" font-size="11.5" fill="#b91c1c">construction, asserted by tests.</text>

  <text x="40" y="516" font-size="11" fill="#94a3b8">AWS SAM · EventBridge · Lambda · S3 · SES · idempotent runs (retries 0 + brief dedup) · ledger↔broker reconciliation at startup · yfinance market data</text>
</svg>
