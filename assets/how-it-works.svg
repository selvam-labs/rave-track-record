<svg width="1200" height="380" viewBox="0 0 1200 380" xmlns="http://www.w3.org/2000/svg" role="img" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <title>How RAVE works, in plain words</title>
  <desc>Five steps: RAVE wakes itself every trading morning, reads the day's market map, checks the market's fear gauge to decide bet size, follows its written rules with no emotions or overrides, and publishes its scorecard to a public page that cannot be backdated.</desc>
  <defs>
    <marker id="arr2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M1 1L9 5L1 9" fill="none" stroke="#64748b" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="1200" height="380" fill="#ffffff"/>

  <text x="40" y="46" font-size="20" font-weight="600" fill="#0f172a">How RAVE works — in plain words</text>

  <rect x="40" y="90" width="200" height="180" rx="10" fill="#f8fafc" stroke="#cbd5e1"/>
  <circle cx="72" cy="126" r="16" fill="#6366f1"/>
  <text x="72" y="131" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle">1</text>
  <text x="56" y="168" font-size="14" font-weight="600" fill="#0f172a">Wakes itself</text>
  <text x="56" y="196" font-size="12.5" fill="#475569">Every trading morning</text>
  <text x="56" y="213" font-size="12.5" fill="#475569">at 10 sharp. No human,</text>
  <text x="56" y="230" font-size="12.5" fill="#475569">no laptop needed.</text>

  <line x1="240" y1="180" x2="264" y2="180" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr2)"/>

  <rect x="270" y="90" width="200" height="180" rx="10" fill="#f8fafc" stroke="#cbd5e1"/>
  <circle cx="302" cy="126" r="16" fill="#6366f1"/>
  <text x="302" y="131" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle">2</text>
  <text x="286" y="168" font-size="14" font-weight="600" fill="#0f172a">Reads the market map</text>
  <text x="286" y="196" font-size="12.5" fill="#475569">Where each asset looks</text>
  <text x="286" y="213" font-size="12.5" fill="#475569">cheap or stretched</text>
  <text x="286" y="230" font-size="12.5" fill="#475569">today.</text>

  <line x1="470" y1="180" x2="494" y2="180" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr2)"/>

  <rect x="500" y="90" width="200" height="180" rx="10" fill="#f8fafc" stroke="#cbd5e1"/>
  <circle cx="532" cy="126" r="16" fill="#6366f1"/>
  <text x="532" y="131" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle">3</text>
  <text x="516" y="168" font-size="14" font-weight="600" fill="#0f172a">Checks the fear gauge</text>
  <text x="516" y="196" font-size="12.5" fill="#475569">Market fear decides how</text>
  <text x="516" y="213" font-size="12.5" fill="#475569">big a bet gets — never</text>
  <text x="516" y="230" font-size="12.5" fill="#475569">what to buy.</text>

  <line x1="700" y1="180" x2="724" y2="180" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr2)"/>

  <rect x="730" y="90" width="200" height="180" rx="10" fill="#f8fafc" stroke="#cbd5e1"/>
  <circle cx="762" cy="126" r="16" fill="#6366f1"/>
  <text x="762" y="131" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle">4</text>
  <text x="746" y="168" font-size="14" font-weight="600" fill="#0f172a">Follows written rules</text>
  <text x="746" y="196" font-size="12.5" fill="#475569">Buy, trim, or sit still.</text>
  <text x="746" y="213" font-size="12.5" fill="#475569">No emotions, no</text>
  <text x="746" y="230" font-size="12.5" fill="#475569">overrides, no exceptions.</text>

  <line x1="930" y1="180" x2="954" y2="180" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr2)"/>

  <rect x="960" y="90" width="200" height="180" rx="10" fill="#ecfdf5" stroke="#10b981"/>
  <circle cx="992" cy="126" r="16" fill="#059669"/>
  <text x="992" y="131" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle">5</text>
  <text x="976" y="160" font-size="14" font-weight="600" fill="#064e3b">Publishes its</text>
  <text x="976" y="178" font-size="14" font-weight="600" fill="#064e3b">scorecard</text>
  <text x="976" y="204" font-size="12.5" fill="#047857">To a public page that</text>
  <text x="976" y="221" font-size="12.5" fill="#047857">can't be backdated</text>
  <text x="976" y="238" font-size="12.5" fill="#047857">or faked.</text>

  <text x="600" y="320" font-size="13" fill="#64748b" text-anchor="middle">A practice (paper) account — the rules trade; the human only watches.</text>
  <text x="600" y="342" font-size="12" fill="#94a3b8" text-anchor="middle">Live scorecard: selvam-labs.github.io/rave-track-record</text>
</svg>
